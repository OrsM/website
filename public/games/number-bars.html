<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Number Bars</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;overscroll-behavior-y:contain}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:#ffffff;
    color:#111111;
    display:flex;flex-direction:column;
    height:100dvh;height:100vh;
    -webkit-user-select:none;user-select:none;
  }
  .back-bar{padding:10px 16px;border-bottom:1px solid #e0e0e0;flex-shrink:0}
  .back-bar a{font-size:13px;color:#666;text-decoration:none}

  .top{text-align:center;padding:8px 0 2px}
  .top h1{font-size:1.2rem;font-weight:700;color:#111111}
  .top p{font-size:.68rem;color:#666666;font-weight:600;letter-spacing:.3px}

  .challenge{
    text-align:center;padding:2px 20px;min-height:40px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .challenge .task{font-size:1rem;font-weight:700;color:#111111}
  .challenge .hint{font-size:.72rem;font-weight:600;color:#666666;margin-top:1px;min-height:1em}

  .workspace{
    flex:1 1 0;display:flex;align-items:flex-end;
    padding:6px 12px 0;min-height:0;overflow:hidden;
    max-height:52vh;position:relative;
  }

  .target-zone{
    width:50px;flex-shrink:0;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-end;margin-right:6px;height:100%;
    gap:4px;
  }
  .target-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1}
  .target-bar{
    width:36px;border-radius:10px;
    border:2px dashed #e0e0e0;background:rgba(0,0,0,.03);
    position:relative;transition:height .3s;
  }
  .target-bar.done{border-color:#111111;background:rgba(0,0,0,.07)}
  .target-bar .label{
    position:absolute;width:100%;text-align:center;
    top:50%;transform:translateY(-50%);
    font-size:.8rem;font-weight:700;color:#111111;opacity:.4;
  }
  .target-label{font-size:.55rem;font-weight:600;color:#666666;margin-top:2px}

  /* two-target layout */
  .target-zone.dual{width:90px;flex-direction:row;gap:6px}
  .target-zone.dual .target-col{flex:1}

  .bar-area{
    flex:1;display:flex;align-items:flex-end;justify-content:center;
    gap:7px;height:100%;padding-bottom:4px;
  }

  .bar{
    width:44px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    cursor:grab;transition:transform .15s,box-shadow .15s;
    touch-action:none;flex-shrink:0;position:relative;
  }
  .bar .num{
    font-size:.85rem;font-weight:700;color:rgba(255,255,255,.95);
    text-shadow:0 1px 2px rgba(0,0,0,.15);pointer-events:none;
  }
  .bar.dragging{
    opacity:.85;z-index:100;
    box-shadow:0 6px 24px rgba(0,0,0,.15);transition:none;
  }
  .bar.merge-target{
    box-shadow:0 0 0 3px rgba(0,0,0,.3);transform:scale(1.05);
  }
  .bar.pop-in{animation:barPop .35s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes barPop{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}

  .info{
    display:flex;justify-content:center;align-items:center;gap:14px;
    padding:2px 0;min-height:20px;font-size:.72rem;font-weight:600;
  }
  .info .streak{color:#666666}
  .info .streak span{color:#111111}
  .info .level-up{color:#111111;opacity:0;transition:opacity .4s}
  .info .level-up.show{opacity:1}

  .actions{
    display:flex;gap:7px;padding:5px 16px 10px;
  }
  .actions button{
    flex:1;padding:10px 0;border:1px solid #e0e0e0;border-radius:8px;
    font-family:inherit;font-size:.82rem;font-weight:700;
    cursor:pointer;transition:all .15s;
  }
  .actions button:active{transform:scale(.95)}
  .btn-reset{background:#f5f5f5;color:#666666}
  .btn-done{background:#111111;color:#ffffff;border-color:#111111}

  .feedback{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(255,255,255,.93);
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;
  }
  .feedback.show{opacity:1;pointer-events:auto}
  .feedback .emoji{font-size:2.2rem;margin-bottom:4px}
  .feedback .msg{font-size:1rem;font-weight:700;color:#111111}
  .feedback .eq{font-size:.85rem;font-weight:600;color:#666666;margin-top:4px}

  .start-prompt{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;cursor:pointer;background:rgba(255,255,255,.96);z-index:60;
  }
  .start-prompt .emoji{font-size:2.5rem}
  .start-prompt .msg{font-size:.9rem;font-weight:700;color:#111111;margin-top:6px}
  .start-prompt .sub{font-size:.7rem;font-weight:600;color:#666666;margin-top:4px}
  .start-prompt.hide{display:none}
</style>
</head>
<body>

<div class="back-bar"><a href="/">← Miguel</a></div>

<div class="top">
  <h1>Number Bars</h1>
  <p>PICK · MERGE · MATCH</p>
</div>

<div class="challenge">
  <div class="task" id="task"></div>
  <div class="hint" id="hintText"></div>
</div>

<div class="workspace" id="workspace">
  <div class="target-zone" id="targetZone">
    <div class="target-col">
      <div class="target-bar" id="targetBar1"><span class="label" id="targetLabel1"></span></div>
      <div class="target-label" id="targetText1">Target</div>
    </div>
    <div class="target-col" id="targetCol2" style="display:none">
      <div class="target-bar" id="targetBar2"><span class="label" id="targetLabel2"></span></div>
      <div class="target-label" id="targetText2">Target 2</div>
    </div>
  </div>
  <div class="bar-area" id="barArea"></div>
</div>

<div class="info">
  <div class="streak" id="streak"></div>
  <div class="level-up" id="levelUp">⬆ getting harder!</div>
</div>

<div class="actions">
  <button class="btn-reset" onclick="resetRound()">Reset</button>
  <button class="btn-done" onclick="checkAnswer()">Done!</button>
</div>

<div class="feedback" id="feedback">
  <div class="emoji"></div>
  <div class="msg"></div>
  <div class="eq"></div>
</div>

<div class="start-prompt" id="startPrompt" onclick="begin()">
  <div class="emoji">📊</div>
  <div class="msg">Tap to start!</div>
  <div class="sub">Drag bars together to add them</div>
</div>

<script>
const COLORS=['#E8734A','#4ECDC4','#A78BFA','#F4A261','#E76F8B','#5BB5E0','#7EC88B','#D4A05A','#FF8A9B','#6CC4A1'];
function barColor(n){return COLORS[(n-1)%COLORS.length]}

const $=id=>document.getElementById(id);
const $barArea=$('barArea'),$ws=$('workspace'),$fb=$('feedback'),
      $streak=$('streak'),$lu=$('levelUp'),$start=$('startPrompt'),
      $task=$('task'),$hint=$('hintText'),
      $tz=$('targetZone'),
      $tb1=$('targetBar1'),$tl1=$('targetLabel1'),$tt1=$('targetText1'),
      $tb2=$('targetBar2'),$tl2=$('targetLabel2'),$tt2=$('targetText2'),
      $tc2=$('targetCol2');

let diff=0,streak=0,wrongStreak=0,luTimer=0;
let targets=[],pieces=[],roundPieces=[];
let dragBar=null,dragOffX=0,dragOffY=0;

function barHeight(n){
  const h=$ws.clientHeight-20;
  return Math.round((n/10)*h);
}

function createBarEl(val,animate){
  const el=document.createElement('div');
  el.className='bar'+(animate?' pop-in':'');
  el.style.height=barHeight(val)+'px';
  el.style.background=barColor(val);
  el.dataset.value=val;
  const num=document.createElement('span');
  num.className='num';num.textContent=val;
  el.appendChild(num);
  el.addEventListener('touchstart',onTS,{passive:false});
  el.addEventListener('mousedown',onMD);
  return el;
}

function renderBars(animate){
  $barArea.innerHTML='';
  pieces.forEach((v,i)=>{
    const el=createBarEl(v,animate);
    el.dataset.idx=i;
    $barArea.appendChild(el);
  });
  updateTargetHighlights();
}

function updateTargetHighlights(){
  $tb1.classList.toggle('done',pieces.includes(targets[0]));
  if(targets.length>1) $tb2.classList.toggle('done',pieces.includes(targets[1]));
}

function setTargets(t){
  targets=t;
  $tb1.style.height=barHeight(t[0])+'px';
  $tl1.textContent=t[0];
  if(t.length>1){
    $tz.classList.add('dual');
    $tc2.style.display='';
    $tb2.style.height=barHeight(t[1])+'px';
    $tl2.textContent=t[1];
    $tt1.textContent='Target 1';
    $tt2.textContent='Target 2';
  }else{
    $tz.classList.remove('dual');
    $tc2.style.display='none';
    $tt1.textContent='Target';
  }
  $tb1.classList.remove('done');
  $tb2.classList.remove('done');
}

/* ── Drag to merge ── */
function onTS(e){e.preventDefault();const t=e.touches[0];startDrag(e.currentTarget,t.clientX,t.clientY);document.addEventListener('touchmove',onTM,{passive:false});document.addEventListener('touchend',onTE)}
function onMD(e){startDrag(e.currentTarget,e.clientX,e.clientY);document.addEventListener('mousemove',onMM);document.addEventListener('mouseup',onMU)}

function startDrag(el,x,y){
  dragBar=el;
  const r=el.getBoundingClientRect();
  dragOffX=x-r.left;dragOffY=y-r.top;

  // Placeholder to keep layout stable
  const ph=document.createElement('div');
  ph.style.width=r.width+'px';
  ph.style.height=r.height+'px';
  ph.style.visibility='hidden';
  ph.style.flexShrink='0';
  el.parentNode.insertBefore(ph,el);
  dragBar._ph=ph;

  el.classList.add('dragging');
  el.style.position='fixed';
  el.style.left=r.left+'px';
  el.style.top=r.top+'px';
  el.style.width=r.width+'px';
  el.style.zIndex=100;
}

function moveDrag(x,y){
  if(!dragBar)return;
  dragBar.style.left=(x-dragOffX)+'px';
  dragBar.style.top=(y-dragOffY)+'px';
  $barArea.querySelectorAll('.bar:not(.dragging)').forEach(b=>b.classList.remove('merge-target'));
  const t=findTarget(x,y);
  if(t)t.classList.add('merge-target');
}

function endDrag(){
  if(!dragBar)return;
  $barArea.querySelectorAll('.bar').forEach(b=>b.classList.remove('merge-target'));
  if(dragBar._ph){dragBar._ph.remove();dragBar._ph=null}
  dragBar.classList.remove('dragging');
  dragBar.style.position='';dragBar.style.left='';dragBar.style.top='';dragBar.style.zIndex='';dragBar.style.width='';
  document.removeEventListener('touchmove',onTM);
  document.removeEventListener('touchend',onTE);
  document.removeEventListener('mousemove',onMM);
  document.removeEventListener('mouseup',onMU);
}

function onTM(e){e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY)}
function onTE(e){if(!dragBar)return;finishDrag(findTarget(e.changedTouches[0].clientX,e.changedTouches[0].clientY))}
function onMM(e){moveDrag(e.clientX,e.clientY)}
function onMU(e){finishDrag(findTarget(e.clientX,e.clientY))}

function finishDrag(mt){
  if(!dragBar)return;
  const di=parseInt(dragBar.dataset.idx);
  endDrag();
  if(mt&&mt!==dragBar){
    const ti=parseInt(mt.dataset.idx);
    const nv=pieces[di]+pieces[ti];
    if(nv<=10){
      pieces[ti]=nv;
      pieces.splice(di,1);
      renderBars(false);
      // Animate merged bar
      const bars=$barArea.querySelectorAll('.bar');
      const mi=di<ti?ti-1:ti;
      if(bars[mi]){
        bars[mi].style.height='0px';
        requestAnimationFrame(()=>{
          bars[mi].style.transition='height .3s cubic-bezier(.34,1.56,.64,1)';
          bars[mi].style.height=barHeight(nv)+'px';
        });
      }
    }else renderBars(false);
  }else renderBars(false);
  dragBar=null;
}

function findTarget(x,y){
  for(const b of $barArea.querySelectorAll('.bar:not(.dragging)')){
    const r=b.getBoundingClientRect();
    if(x>=r.left-12&&x<=r.right+12&&y>=r.top-12&&y<=r.bottom+12)return b;
  }
  return null;
}

/* ── Puzzle generation with validation ── */

// All subsets of arr and their sums
function subsetSums(arr){
  const sums=new Set();
  for(let m=1;m<(1<<arr.length);m++){
    let s=0;
    for(let i=0;i<arr.length;i++)if(m&(1<<i))s+=arr[i];
    sums.add(s);
  }
  return sums;
}

// Count how many subsets sum to target
function countSubsets(arr,target){
  let count=0;
  for(let m=1;m<(1<<arr.length);m++){
    let s=0;
    for(let i=0;i<arr.length;i++)if(m&(1<<i))s+=arr[i];
    if(s===target)count++;
  }
  return count;
}

// Check if arr contains val as an element
function hasVal(arr,v){return arr.includes(v)}

// Generate a single-target puzzle
function genSingleTarget(target,numDistractors){
  for(let attempt=0;attempt<100;attempt++){
    // Build a valid solution: 2-3 parts that sum to target
    const numParts=2+Math.floor(Math.random()*2); // 2 or 3
    const solution=decompose(target,numParts);
    if(!solution)continue;

    // No solution piece should equal target
    if(solution.some(v=>v===target))continue;

    // Generate distractors that don't create alternative solutions
    const distractors=[];
    for(let d=0;d<numDistractors;d++){
      distractors.push(1+Math.floor(Math.random()*Math.min(5,target)));
    }

    const allPieces=[...solution,...distractors];

    // Validate: exactly one subset sums to target? Too strict for multiple distractors.
    // Instead: no single piece equals target, and solution subset works
    if(hasVal(allPieces,target))continue;

    // Verify the solution subset still works within all pieces
    const sums=subsetSums(allPieces);
    if(!sums.has(target))continue;

    return allPieces;
  }
  // Fallback: simple guaranteed puzzle
  const a=1+Math.floor(Math.random()*(target-1));
  const b=target-a;
  const d=1+Math.floor(Math.random()*3);
  return[a,b,d];
}

// Generate a dual-target puzzle
function genDualTarget(t1,t2){
  for(let attempt=0;attempt<100;attempt++){
    const sol1=decompose(t1,2);
    const sol2=decompose(t2,2);
    if(!sol1||!sol2)continue;

    const allPieces=[...sol1,...sol2];

    // No single piece should equal either target
    if(allPieces.some(v=>v===t1||v===t2))continue;

    // Both targets should be reachable
    const sums=subsetSums(allPieces);
    if(!sums.has(t1)||!sums.has(t2))continue;

    // Add 0-1 distractor
    if(Math.random()<0.5){
      allPieces.push(1+Math.floor(Math.random()*3));
    }

    return allPieces;
  }
  // Fallback
  return[1,t1-1,1,t2-1,2];
}

// Decompose n into exactly numParts parts, each 1–(n-1)
function decompose(n,numParts){
  if(numParts===2){
    const a=1+Math.floor(Math.random()*(n-1));
    return[a,n-a];
  }
  if(numParts===3&&n>=3){
    for(let att=0;att<20;att++){
      const a=1+Math.floor(Math.random()*Math.max(1,n-2));
      const rem=n-a;
      if(rem<2)continue;
      const b=1+Math.floor(Math.random()*(rem-1));
      const c=rem-b;
      if(c>=1)return[a,b,c];
    }
  }
  return null;
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

/* ── Difficulty stages ── */
/*
  0–0.3:   easy single target 3–5, 1 distractor
  0.3–0.6: medium single target 5–8, 2 distractors
  0.6–0.85: hard single target 7–10, 2-3 distractors
  0.85–1:  dual target (both 3–7)
*/
function generateRound(){
  let isDual=false;

  if(diff<0.3){
    const t=3+Math.floor(Math.random()*3); // 3-5
    targets=[t];
    pieces=genSingleTarget(t,1);
    $task.textContent=`Build ${t}!`;
    $hint.textContent='Pick the right bars';
  }else if(diff<0.6){
    const t=5+Math.floor(Math.random()*4); // 5-8
    targets=[t];
    pieces=genSingleTarget(t,2);
    $task.textContent=`Build ${t}!`;
    $hint.textContent='You won\'t need all of them';
  }else if(diff<0.85){
    const t=7+Math.floor(Math.random()*4); // 7-10
    targets=[t];
    pieces=genSingleTarget(t,Math.random()<0.5?2:3);
    $task.textContent=`Build ${t}!`;
    $hint.textContent='Choose carefully!';
  }else{
    const t1=3+Math.floor(Math.random()*4); // 3-6
    const t2=3+Math.floor(Math.random()*4); // 3-6
    targets=[t1,t2];
    pieces=genDualTarget(t1,t2);
    isDual=true;
    $task.textContent=`Build ${t1} AND ${t2}!`;
    $hint.textContent='Two targets this time!';
  }

  // 20% confidence round
  if(diff>0.3&&Math.random()<0.2){
    const t=3+Math.floor(Math.random()*3);
    targets=[t];
    pieces=genSingleTarget(t,1);
    isDual=false;
    $task.textContent=`Build ${t}!`;
    $hint.textContent='Pick the right bars';
  }

  shuffle(pieces);
  setTargets(targets);
  roundPieces=[...pieces];
  renderBars(true);
}

function resetRound(){
  pieces=[...roundPieces];
  renderBars(true);
}

/* ── Check answer ── */
function checkAnswer(){
  if(targets.length===1){
    if(pieces.includes(targets[0])){
      streak++;adjustDiff(true);
      showFeedback('🎉',`Yes! ${targets[0]}!`,'');
      setTimeout(generateRound,1500);
    }else{
      streak=0;adjustDiff(false);
      const biggest=Math.max(...pieces);
      if(biggest<targets[0])showFeedback('🤔','Keep merging!',`Biggest: ${biggest}, need ${targets[0]}`);
      else showFeedback('🤔','Not quite — try different bars','Hit Reset to retry');
    }
  }else{
    // Dual target: need both values present as separate bars
    const has1=pieces.includes(targets[0]);
    const has2=pieces.includes(targets[1]);
    // Handle case where both targets are the same value
    if(targets[0]===targets[1]){
      const count=pieces.filter(v=>v===targets[0]).length;
      if(count>=2){
        streak++;adjustDiff(true);
        showFeedback('🎉',`Both ${targets[0]}s!`,'');
        setTimeout(generateRound,1500);
      }else{
        streak=0;adjustDiff(false);
        showFeedback('🤔',count===1?'Got one! Need another '+targets[0]:'Keep building!','');
      }
    }else if(has1&&has2){
      streak++;adjustDiff(true);
      showFeedback('🎉',`${targets[0]} and ${targets[1]}!`,'');
      setTimeout(generateRound,1500);
    }else{
      streak=0;adjustDiff(false);
      if(!has1&&!has2)showFeedback('🤔','Need both targets!',`Build ${targets[0]} and ${targets[1]}`);
      else if(has1)showFeedback('🤔',`Got ${targets[0]}! Now build ${targets[1]}`,'');
      else showFeedback('🤔',`Got ${targets[1]}! Now build ${targets[0]}`,'');
    }
  }
  $streak.innerHTML=streak>=2?`🔥 <span>${streak}</span> in a row`:'';
}

function adjustDiff(correct){
  const prev=diff;
  if(correct){
    diff=Math.min(1,diff+0.04+Math.random()*0.03); // faster: ~0.04-0.07
    wrongStreak=0;
  }else{
    wrongStreak++;
    diff=Math.max(0,diff-(0.07+wrongStreak*0.03));
  }
  for(const t of[0.3,0.6,0.85]){
    if(prev<t&&diff>=t){flashLU();break}
  }
}

function flashLU(){
  $lu.classList.add('show');
  clearTimeout(luTimer);
  luTimer=setTimeout(()=>$lu.classList.remove('show'),2000);
}

function showFeedback(emoji,msg,eq){
  $fb.querySelector('.emoji').textContent=emoji;
  $fb.querySelector('.msg').textContent=msg;
  $fb.querySelector('.eq').textContent=eq||'';
  $fb.classList.add('show');
  setTimeout(()=>$fb.classList.remove('show'),1400);
}

function begin(){
  $start.classList.add('hide');
  generateRound();
}

document.addEventListener('touchmove',e=>{
  if(dragBar){e.preventDefault();return}
  if(window.scrollY===0&&e.cancelable)e.preventDefault();
},{passive:false});

window.addEventListener('resize',()=>{
  if(pieces.length)renderBars(false);
  if(targets.length){
    $tb1.style.height=barHeight(targets[0])+'px';
    if(targets[1])$tb2.style.height=barHeight(targets[1])+'px';
  }
});
</script>
</body>
</html>

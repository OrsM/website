  for(var i=0;i<20;i++){

  var gR=R([]),pR=R(null),tR=R({id:null,el:null});
  var t=L[lang];

    sG(Array.from({length:r.ng},function(){return[]}));
    sP(Array.from({length:r.ps},function(_,i){return{id:"b-"+i,em:r.em}}));
    sF(null);sD(false);sC(false);sH(false);sM([]);sDr(false);sE(false);cg();
  },[]);

  E(function(){init(0)},[init]);

  var place=C(function(gi,bi){
    sF(null);sM([]);
    sP(function(prev){
      var fp;for(var i=0;i<prev.length;i++)if(prev[i].id===bi){fp=prev[i];break}
      if(fp){sG(function(g){var n=g.map(function(a){return a.slice()});n[gi].push(fp);return n});return prev.filter(function(b){return b.id!==bi})}
      sG(function(g){
        var n=g.map(function(a){return a.slice()}),it,fr=-1;
        for(var i=0;i<n.length;i++){for(var j=0;j<n[i].length;j++)if(n[i][j].id===bi){fr=i;it=n[i][j];break}if(it)break}
        if(it&&fr!==gi){n[fr]=n[fr].filter(function(b){return b.id!==bi});n[gi].push(it)}return n});return prev});
  },[]);

  var ret=C(function(bi){
    sG(function(prev){
      var it,fr=-1;
      for(var i=0;i<prev.length;i++){for(var j=0;j<prev[i].length;j++)if(prev[i][j].id===bi){fr=i;it=prev[i][j];break}if(it)break}
      if(it){var n=prev.map(function(a){return a.slice()});n[fr]=n[fr].filter(function(b){return b.id!==bi});sP(function(p){return p.concat([it])});return n}
      return prev});sF(null);sM([]);
  },[]);

  var ts=function(ev,id,em){
    if(done)return;ev.preventDefault();cg();

  },[place,ret]);

  var hint=rd.t==="d"?t.sh:t.mh;
  var eq=rd.t==="d"?t.dr(rd.tot-rd.rm,rd.ng,rd.pg):t.mr(rd.ng,rd.pg,rd.tot);
  var cols=function(n){return n<=2?2:n<=4?2:n<=6?3:4};

  // bubble helper
  var bub=function(b,sz,inG){return h("div",{key:b.id,draggable:true,
    onDragStart:function(e){e.dataTransfer.setData("text/plain",b.id)},
    onTouchStart:function(e){ts(e,b.id,b.em)},
    onClick:inG&&!done?function(){ret(b.id)}:undefined,
    style:{width:sz,height:sz,display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:sz*.55,cursor:"grab",userSelect:"none",borderRadius:"50%",
      background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,.08)",touchAction:"none",

  return h("div",{style:{minHeight:"100vh",minHeight:"100dvh",padding:"12px",maxWidth:500,margin:"0 auto"}},
    // header
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      h("div",{style:{fontSize:20,fontWeight:800,color:TXT}},t.title),
      h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
        h("div",{style:{fontSize:15,fontWeight:800,color:OK}},"⭐ "+stars),
        h("button",{onClick:function(){sL(lang==="en"?"es":"en")},style:{background:TXT,color:"#fdf6e3",border:"none",borderRadius:14,padding:"4px 12px",fontSize:12,fontWeight:800,cursor:"pointer"}},lang==="en"?"🇪🇸":"🇬🇧"))),
    // prompt
    h("div",{style:{textAlign:"center",marginBottom:10,background:"rgba(255,255,255,.7)",borderRadius:16,padding:"14px 12px"}},
      h("div",{style:{fontSize:21,fontWeight:800,color:TXT}},prompt),
      h("div",{style:{fontSize:11,color:SUB,fontWeight:600,marginTop:4}},hint,
        rd.t==="d"&&rd.rm>0?h("span",{style:{display:"block",color:ERR,fontWeight:700,marginTop:2}},"("+rd.rm+" "+t.left+")"):null)),
    // pool

            padding:6,display:"flex",flexWrap:"wrap",gap:3,justifyContent:"center",alignContent:"flex-start",

      h("div",{style:{display:"flex",gap:8,justifyContent:"center"}},

}

</script>
